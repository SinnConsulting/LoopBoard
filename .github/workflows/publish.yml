name: Publish to Marketplace

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match an existing vX.Y.Z GitHub Release with a .vsix asset)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download vsix from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "v${{ inputs.version }}" --pattern "*.vsix" --dir .

      - name: Publish to Marketplace
        run: npx --yes @vscode/vsce publish --packagePath loopboard-todo-${{ inputs.version }}.vsix --pat "${{ secrets.VSCE_PAT }}"
