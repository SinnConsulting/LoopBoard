name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      published: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vsix:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dev dependencies
        run: npm ci

      - name: Build
        run: npx tsc -p ./

      - name: Test
        run: |
          npx tsc -p ./tsconfig.test.json
          node --test 'test/*.test.js'

      # Sync package.json/package-lock.json to the released version so the
      # checked-in manifest matches the GitHub release / Marketplace version.
      - name: Sync version
        run: npm version ${{ needs.release.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Package vsix
        run: npx --yes @vscode/vsce package --no-dependencies

      - name: Upload vsix to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.release.outputs.version }}" "loopboard-todo-${{ needs.release.outputs.version }}.vsix"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ needs.release.outputs.version }} [skip ci]"
          git push origin HEAD:main

      # Last step: a Marketplace flake must not block the release asset or the
      # version-bump commit. On failure, retry via the manual publish.yml.
      - name: Publish to Marketplace
        run: npx --yes @vscode/vsce publish --packagePath "loopboard-todo-${{ needs.release.outputs.version }}.vsix" --pat "${{ secrets.VSCE_PAT }}"
